# Test stack — production services + MailHog + OpenLDAP on alternate ports.
# Usage: ./deploy.sh --test
#
# Ports (override in .env):
#   https://localhost:${HTTPS_PORT:-8443}  — app (self-signed cert, browser warning expected)
#   http://localhost:${HTTP_PORT:-8080}    — redirects to HTTPS
#   http://localhost:${MAILHOG_PORT:-8025} — MailHog web UI
#
# Test LDAP login: testuser@dev.local / TestPass123!

services:
  flask:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: flask_test
    environment:
      - FLASK_ENV=production
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      ldap:
        condition: service_started
      mailhog:
        condition: service_started
    volumes:
      - logs_test:/app/logs:z
      - config_test:/app/instance:z
      - uploads_test:/app/uploads:z
    restart: unless-stopped
    networks:
      - test-network

  db:
    build:
      context: .
      dockerfile: docker/db/Dockerfile
    container_name: postgres_test
    env_file:
      - .env
    volumes:
      - pgdata_test:/var/lib/postgresql/data:z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - test-network

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx_test
    ports:
      - "${HTTP_PORT:-8080}:80"
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      - ./docker/nginx/nginx.test.conf:/etc/nginx/conf.d/default.conf:z
      - ./docker/nginx/certs:/etc/nginx/certs:z
    depends_on:
      - flask
    restart: unless-stopped
    networks:
      - test-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog_test
    ports:
      - "${MAILHOG_PORT:-8025}:8025"
    networks:
      - test-network

  ldap:
    image: osixia/openldap:1.5.0
    container_name: ldap_test
    hostname: ldap.test.local
    environment:
      - LDAP_ORGANISATION=Dev Company
      - LDAP_DOMAIN=dev.local
      - LDAP_ADMIN_PASSWORD=devpassword
      - LDAP_TLS=false
    volumes:
      - ./docker/ldap/seed.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/seed.ldif:ro
      - ldap_data_test:/var/lib/ldap
      - ldap_config_test:/etc/ldap/slapd.d
    command: --copy-service
    networks:
      - test-network

volumes:
  pgdata_test:
  logs_test:
  config_test:
  uploads_test:
  ldap_data_test:
  ldap_config_test:

networks:
  test-network:
